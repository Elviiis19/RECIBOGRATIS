<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Elvis Dias" />
    <link rel="preload" as="image" href="/cubes.png" />
    <meta name="robots" content="index, follow" />
    <script>
      (function() {
        var scriptsLoaded = false;
        function loadScripts() {
          if (scriptsLoaded) return;
          scriptsLoaded = true;

          // AdSense
          var adsScript = document.createElement('script');
          adsScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4064231456386943";
          adsScript.async = true;
          adsScript.crossOrigin = "anonymous";
          document.head.appendChild(adsScript);

          // Google Tag Manager
          var gtagScript = document.createElement('script');
          gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-DK03NDV0QM";
          gtagScript.async = true;
          document.head.appendChild(gtagScript);

          window.dataLayer = window.dataLayer || [];
          function gtag(){window.dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-DK03NDV0QM');
        }

        // Lazy load on interaction
        var events = ['scroll', 'mousemove', 'mousedown', 'touchstart', 'keydown'];
        events.forEach(function(event) {
          window.addEventListener(event, loadScripts, { once: true, passive: true });
        });

        // Fallback
        setTimeout(loadScripts, 5000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
